name: MacSweep Release

on:
  push:
    tags:
      - "v*.*.*"          # triggers on tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: write          # needed to create GitHub Releases

jobs:
  build-and-release-mac:
    name: Build & Release MacSweep (DMG)
    runs-on: macos-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select latest Xcode ────────────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Build MacSweep archive ─────────────────────────────────────────
      - name: Build MacSweep (archive)
        run: |
          xcodebuild archive \
            -project MacSweep.xcodeproj \
            -scheme MacSweep \
            -configuration Release \
            -archivePath ./build/MacSweep.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 4. Export the .app from the archive ──────────────────────────────
      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/MacSweep.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist /dev/stdin <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>mac-application</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

      # ── 5. Create DMG from exported .app ─────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          TAG="${{ github.ref_name }}"
          DMG_NAME="MacSweep-${TAG}-mac.dmg"
          create-dmg \
            --volname "MacSweep ${TAG}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MacSweep.app" 175 190 \
            --hide-extension "MacSweep.app" \
            --app-drop-link 425 190 \
            "${DMG_NAME}" \
            "./build/export/MacSweep.app"
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV

      # ── 6. Upload DMG to GitHub Release ──────────────────────────────────
      - name: Create GitHub Release & Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          name: "MacSweep ${{ github.ref_name }}"
          tag_name: "${{ github.ref_name }}"
          body: |
            ## 🧹 MacSweep ${{ github.ref_name }}

            ### 📥 How to Install (macOS)
            1. Download **${{ env.DMG_NAME }}** below
            2. Open the `.dmg` file
            3. Drag **MacSweep.app** into your **Applications** folder
            4. Launch MacSweep from Launchpad or Spotlight

            > ⚠️ First launch: right-click the app → **Open** → **Open** (to bypass Gatekeeper on unsigned builds)

            ### System Requirements
            - macOS 13 Ventura or later
            - Apple Silicon (M1/M2/M3) or Intel Mac
          files: "${{ env.DMG_NAME }}"
          draft: false
          prerelease: false
