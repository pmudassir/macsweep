name: MacSweep Release

on:
  push:
    tags:
      - "v*.*.*"          # triggers on tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: write          # needed to create GitHub Releases

jobs:
  build-and-release-mac:
    name: Build & Release MacSweep (DMG)
    runs-on: macos-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select latest stable Xcode ─────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Show available schemes (debug) ─────────────────────────────────
      - name: List schemes
        run: xcodebuild -project MacSweep.xcodeproj -list

      # ── 4. Build MacSweep.app ──────────────────────────────────────────────
      #    - No xcpretty (masks errors), no || true (hides failures)
      #    - Using -destination to force macOS platform
      #    - Signing disabled for CI
      - name: Build MacSweep.app
        run: |
          xcodebuild build \
            -project MacSweep.xcodeproj \
            -scheme MacSweep \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_APP_SANDBOX=NO \
            CODE_SIGN_ENTITLEMENTS=""

      # ── 5. Find and verify the .app bundle ────────────────────────────────
      - name: Verify .app bundle
        run: |
          echo "--- Searching for MacSweep.app ---"
          find ./build -name "MacSweep.app" -type d

          APP_PATH=$(find ./build -name "MacSweep.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: MacSweep.app not found in build output!"
            exit 1
          fi

          EXECUTABLE="$APP_PATH/Contents/MacOS/MacSweep"
          echo "--- Checking for executable at: $EXECUTABLE ---"

          if [ ! -f "$EXECUTABLE" ]; then
            echo "❌ ERROR: Executable is missing inside the .app bundle!"
            echo "Contents of MacOS folder:"
            ls -la "$APP_PATH/Contents/MacOS/" || echo "(folder does not exist)"
            exit 1
          fi

          echo "✅ App found: $APP_PATH"
          echo "✅ Executable exists: $EXECUTABLE"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ── 6. Ad-hoc code sign ───────────────────────────────────────────────
      #    Prevents "damaged or incomplete" error on macOS Gatekeeper.
      #    codesign -s - applies an ad-hoc signature (no Apple cert needed).
      - name: Ad-hoc code sign
        run: |
          echo "Signing: ${{ env.APP_PATH }}"
          codesign --force --deep --sign - "${{ env.APP_PATH }}"
          codesign --verify --verbose "${{ env.APP_PATH }}"
          echo "✅ Ad-hoc signing complete"

      # ── 7. Stage .app for DMG packaging ──────────────────────────────────
      - name: Stage .app for DMG
        run: |
          mkdir -p ./dmg-staging
          cp -R "${{ env.APP_PATH }}" ./dmg-staging/MacSweep.app
          echo "Staged contents:"
          ls -la ./dmg-staging/

      # ── 8. Install create-dmg ─────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      # ── 9. Create DMG ─────────────────────────────────────────────────────
      #    create-dmg exits with code 2 when --no-internet-enable is set,
      #    even on success — we check for the file explicitly.
      - name: Create DMG
        run: |
          TAG="${{ github.ref_name }}"
          DMG_NAME="MacSweep-${TAG}-mac.dmg"

          create-dmg \
            --volname "MacSweep ${TAG}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MacSweep.app" 175 190 \
            --hide-extension "MacSweep.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "${DMG_NAME}" \
            "./dmg-staging/" || true

          if [ -f "${DMG_NAME}" ]; then
            echo "✅ DMG created: ${DMG_NAME}"
            echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
          else
            echo "❌ ERROR: DMG file was not created!"
            exit 1
          fi

      # ── 10. Upload DMG to GitHub Release ──────────────────────────────────
      - name: Create GitHub Release & Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          name: "MacSweep & WinSweep ${{ github.ref_name }}"
          tag_name: "${{ github.ref_name }}"
          body: |
            ## 🧹 MacSweep & WinSweep ${{ github.ref_name }}

            ---

            ### 🍎 macOS — Download & Install
            1. Download **${{ env.DMG_NAME }}** below
            2. Open the `.dmg` file
            3. Drag **MacSweep.app** into your **Applications** folder
            4. Launch MacSweep from Launchpad or Spotlight

            > ⚠️ **Gatekeeper blocking the app?**
            > Open **Terminal** and run:
            > ```bash
            > xattr -cr /Applications/MacSweep.app
            > ```
            > Then launch the app again.
            >
            > Or: go to **System Settings → Privacy & Security** → scroll down → click **Open Anyway**

            ---

            ### 🪟 Windows — Download & Install
            1. Download **WinSweep-${{ github.ref_name }}-win-x64.zip** below
            2. Extract the ZIP anywhere
            3. Double-click **WinSweep.exe** (Run as Administrator for full features)

            > ✅ No installer needed. No .NET required. Just extract and run!

            ---

            ### System Requirements
            | | macOS | Windows |
            |---|---|---|
            | OS | macOS 13 Ventura+ | Windows 10/11 (64-bit) |
            | Arch | Apple Silicon / Intel | x64 |
          files: "${{ env.DMG_NAME }}"
          draft: false
          prerelease: false
