name: MacSweep Release

on:
  push:
    tags:
      - "v*.*.*"          # triggers on tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: write          # needed to create GitHub Releases

jobs:
  build-and-release-mac:
    name: Build & Release MacSweep (DMG)
    runs-on: macos-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select latest stable Xcode ─────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Build MacSweep.app (no code signing, no archive) ───────────────
      #    We build directly into ./build/Release/MacSweep.app
      #    Disabling sandbox + signing so it builds cleanly on CI
      - name: Build MacSweep.app
        run: |
          xcodebuild build \
            -project MacSweep.xcodeproj \
            -scheme MacSweep \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_APP_SANDBOX=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            | xcpretty || true

      # ── 4. Locate the built .app ──────────────────────────────────────────
      - name: Locate .app bundle
        run: |
          APP_PATH=$(find ./build -name "MacSweep.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app at: $APP_PATH"

      # ── 5. Install create-dmg ─────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      # ── 6. Create DMG ─────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          TAG="${{ github.ref_name }}"
          DMG_NAME="MacSweep-${TAG}-mac.dmg"

          create-dmg \
            --volname "MacSweep ${TAG}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MacSweep.app" 175 190 \
            --hide-extension "MacSweep.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "${DMG_NAME}" \
            "${{ env.APP_PATH }}"

          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV

      # ── 7. Upload DMG to GitHub Release ───────────────────────────────────
      - name: Create GitHub Release & Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          name: "MacSweep & WinSweep ${{ github.ref_name }}"
          tag_name: "${{ github.ref_name }}"
          body: |
            ## 🧹 MacSweep & WinSweep ${{ github.ref_name }}

            ---

            ### 🍎 macOS — Download & Install
            1. Download **${{ env.DMG_NAME }}** below
            2. Open the `.dmg` file
            3. Drag **MacSweep.app** into your **Applications** folder
            4. Launch MacSweep from Launchpad or Spotlight

            > ⚠️ First launch: right-click the app → **Open** → **Open** (to bypass Gatekeeper on unsigned builds)

            ---

            ### 🪟 Windows — Download & Install
            1. Download **WinSweep-${{ github.ref_name }}-win-x64.zip** below
            2. Extract the ZIP anywhere
            3. Double-click **WinSweep.exe** (Run as Administrator for full features)

            > ✅ No installer needed. No .NET required. Just extract and run!

            ---

            ### System Requirements
            | | macOS | Windows |
            |---|---|---|
            | OS | macOS 14 Sonoma+ | Windows 10/11 (64-bit) |
            | Arch | Apple Silicon / Intel | x64 |
          files: "${{ env.DMG_NAME }}"
          draft: false
          prerelease: false
